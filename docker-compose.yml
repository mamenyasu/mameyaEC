version: '3.8'

services:
  app:
    build:
      context: ./docker/php
    volumes:
      - ./src:/var/www/html
    command: /bin/sh -c "cp /var/www/html/.env.docker /var/www/html/.env && php-fpm"
    container_name: mameyaec_app

  web:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    container_name: mameyaec_web
